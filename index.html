<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater Seat Booking System</title>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <header>
        <nav>
            <h1>Book Your Ticket</h1>
        </nav>
    </header>

    <main>

        <section id="theater">

            <div id="screen-div">
                <p>↑ SCREEN ↑</p>
            </div>

            <div id="seat-legend">
                <div class="legend-item">
                    <div class="legend-box available"></div>
                    <span>Available</span>
                </div>

                <div class="legend-item">
                    <div class="legend-box booked"></div>
                    <span>Booked</span>
                </div>

            </div>

            <div id="seat-container">
                <!-- seats generated by JavaScript -->
            </div>

            <form id="booking-form">
                <label for="ticket-input">
                    Enter Seat Number
                </label>

                <input type="text" id="ticket-input" placeholder="Example: B12" required>

                <button type="submit">
                    Book Seat
                </button>
            </form>

        </section>

    </main>

    <footer>
        <h5>saadferozee © 2026 All Rights Reserved.</h5>
    </footer>

    <script src="scripts/index.js"></script>

</body>

</html>
